services:
  - type: web
    name: vcc-crm
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python Backend/server.py
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
    disk:
      name: vcc-crm-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
